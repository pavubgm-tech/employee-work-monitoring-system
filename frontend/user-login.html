<!DOCTYPE html>
<html>

<head>

    <title>User Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>User Login</h1>

        <input
            type="text"
            id="loginUsername"
            placeholder="Enter Username"
        >

        <input
            type="password"
            id="loginPassword"
            placeholder="Enter Password"
        >

        <button onclick="loginUser()">
            Login
        </button>

        <p>
            Don't have account?
            <a href="register.html">Register</a>
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
