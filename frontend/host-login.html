<!DOCTYPE html>
<html>

<head>

    <title>Host Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Host Login</h1>

        <input

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
